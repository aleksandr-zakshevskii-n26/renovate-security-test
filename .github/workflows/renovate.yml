name: Renovate

on:
  workflow_dispatch:
    inputs:
      log-level:
        description: Log level
        default: debug
        type: choice
        options: [debug, info, warn]
  schedule:
    - cron: '0 8 * * 1-5'

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46.1.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.log-level || 'debug' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_DEPENDENCY_DASHBOARD: "true"
